<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JRS AI · পাপড়ি ও প্রস্ফুটন</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Quicksand:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --petal-pink: #fce4ec;
            --stem-green: #e8f5e9;
            --bloom-rose: #d81b60;
            --soft-mauve: #5d4037;
            --glass-bg: rgba(255, 255, 255, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #fff9f7;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(255, 220, 240, 0.5) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(210, 240, 220, 0.5) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(250, 240, 210, 0.3) 0%, transparent 50%);
            font-family: 'Hind Siliguri', 'Quicksand', sans-serif;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: #4a3b4a;
            line-height: 1.6;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M10,10 Q20,0 30,10 Q20,20 10,10" fill="%23d68b9c" opacity="0.05"/></svg>');
            background-size: 150px 150px;
            animation: floatBackground 60s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes floatBackground {
            from { background-position: 0 0; }
            to { background-position: 500px 1000px; }
        }

        header {
            padding: 20px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(220, 150, 180, 0.08);
            z-index: 10;
        }

        .brand {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #b36a88, #8e7aa3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .system-tag {
            font-size: 0.75rem;
            font-weight: 500;
            color: #8c7380;
            background: white;
            padding: 5px 14px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border: 1px solid rgba(210, 160, 180, 0.2);
            text-decoration: none;
            transition: 0.3s;
        }

        .system-tag:hover {
            background: #fce4ec;
            color: #d81b60;
            transform: translateY(-2px);
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scrollbar-width: none;
            z-index: 5;
        }

        .chat-area::-webkit-scrollbar { display: none; }

        .msg {
            max-width: 85%;
            padding: 16px 22px;
            font-size: 1.05rem;
            animation: springUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
        }

        @keyframes springUp {
            0% { opacity: 0; transform: translateY(20px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .msg.ai {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 1);
            color: #5d4a5d;
            border-radius: 25px 25px 25px 5px;
        }

        .msg.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
            color: #443344;
            border-radius: 25px 25px 5px 25px;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        pre {
            background: #2d272b !important;
            padding: 20px;
            border-radius: 20px;
            margin: 12px 0;
            position: relative;
            border: 1px solid #4a3b4a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        code { font-family: 'Fira Code', monospace; font-size: 0.9rem; color: #ffd1dc; }

        .copy-btn {
            position: absolute; top: 10px; right: 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #ffb1c1;
            padding: 4px 12px;
            font-size: 0.7rem;
            border-radius: 12px;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .input-wrapper {
            padding: 20px 25px 35px;
            background: transparent;
            z-index: 10;
        }

        .input-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(25px);
            padding: 8px 10px 8px 20px;
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 15px 45px rgba(214, 139, 156, 0.15);
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 10px;
            color: #4a3b4a;
            font-family: inherit;
            font-size: 1.1rem;
            outline: none;
        }

        .chat-input::placeholder { color: #bcaaa4; font-weight: 300; }

        .btn-icon {
            background: white;
            border: none;
            color: #d81b60;
            cursor: pointer;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(216, 27, 96, 0.1);
        }

        .btn-icon:hover {
            transform: scale(1.1) rotate(5deg);
            background: #fce4ec;
        }

        .btn-send {
            background: #d81b60;
            color: white;
            margin-left: 8px;
        }

        .btn-send:hover {
            background: #c2185b;
            box-shadow: 0 8px 20px rgba(216, 27, 96, 0.3);
            transform: scale(1.1) translateY(-2px);
        }

        .blooming-status {
            font-style: italic;
            font-size: 0.9rem;
            color: #b388ff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot-pulse {
            width: 6px; height: 6px; border-radius: 50%;
            background: #b388ff;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.4; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">🌸 JRS · ব্লুম</div>
        <a href="http://jakariya41jr.pro.bd/" class="system-tag" target="_blank">আমার প্রোফাইল</a>
    </header>

    <div class="chat-area" id="chatContainer">
        <div class="msg ai">
            <strong>✨ স্বাগতম, বন্ধু</strong><br>
            আমি আপনার প্রাকৃতিক এআই সঙ্গী। আপনার দিনটি কীভাবে রঙিন ও সহজ করে তুলতে পারি? কিছু জিজ্ঞাসা করুন!
        </div>
    </div>

    <div class="input-wrapper">
        <div class="input-container">
            <button class="btn-icon" id="attachBtn" title="ফাইল যুক্ত করুন">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
            </button>
            <input type="file" id="fileInput" hidden>
            
            <input type="text" class="chat-input" id="messageInput" placeholder="আপনার চিন্তাগুলো এখানে ফুটতে দিন..." autocomplete="off">
            
            <button class="btn-icon btn-send" id="sendBtn" aria-label="পাঠান">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <script>
        (function() {
            const chatContainer = document.getElementById('chatContainer');
            const messageInput = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const fileInput = document.getElementById('fileInput');

            function formatText(text) {
                return text
                    .replace(/```(\w+)?\n([\s\S]*?)```/g, (match, lang, code) => {
                        return `<pre><code>${code.trim()}</code><button class="copy-btn" onclick="copyCode(this)">কপি</button></pre>`;
                    })
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/`([^`]+)`/g, '<code>$1</code>')
                    .replace(/\n/g, '<br>');
            }

            window.copyCode = (btn) => {
                const code = btn.previousElementSibling.innerText;
                navigator.clipboard.writeText(code);
                btn.innerText = "কপি হয়েছে!";
                setTimeout(() => btn.innerText = "কপি", 2000);
            };

            async function typeMessage(element, html) {
                element.innerHTML = '';
                let tempDiv = document.createElement('div');
                tempDiv.innerHTML = html;
                const nodes = Array.from(tempDiv.childNodes);
                
                for (let node of nodes) {
                    if (node.nodeType === Node.TEXT_NODE) {
                        const text = node.textContent;
                        for (let i = 0; i < text.length; i++) {
                            element.innerHTML += text[i];
                            chatContainer.scrollTop = chatContainer.scrollHeight;
                            await new Promise(r => setTimeout(r, 12));
                        }
                    } else {
                        element.innerHTML += node.outerHTML;
                        chatContainer.scrollTop = chatContainer.scrollHeight;
                        await new Promise(r => setTimeout(r, 10));
                    }
                }
            }

            async function handleSend() {
                const prompt = messageInput.value.trim();
                if (!prompt) return;

                const userDiv = document.createElement('div');
                userDiv.className = 'msg user';
                userDiv.innerText = prompt;
                chatContainer.appendChild(userDiv);
                
                messageInput.value = '';
                chatContainer.scrollTop = chatContainer.scrollHeight;

                const aiDiv = document.createElement('div');
                aiDiv.className = 'msg ai';
                aiDiv.innerHTML = `<div class="blooming-status"><div class="dot-pulse"></div>🌱 ভাবনাগুলো প্রস্ফুটিত হচ্ছে...</div>`;
                chatContainer.appendChild(aiDiv);

                try {
                    const res = await fetch('https://bj-tricks-ai.vercel.app/chat', {
                        method: 'POST',
                        body: new URLSearchParams({ 'text': prompt })
                    });
                    const data = await res.json();
                    const response = data.result || "দুঃখিত, আমার পাপড়িগুলো কিছুটা এলোমেলো হয়ে গেছে। দয়া করে আবার চেষ্টা করুন।";
                    
                    await typeMessage(aiDiv, formatText(response));
                } catch (e) {
                    aiDiv.innerHTML = '<span style="color: #d81b60;">🍃 সংযোগ বিচ্ছিন্ন হয়েছে। অনুগ্রহ করে ইন্টারনেট চেক করে আবার চেষ্টা করুন।</span>';
                }
            }

            sendBtn.addEventListener('click', handleSend);
            messageInput.addEventListener('keypress', e => { if(e.key === 'Enter') handleSend(); });
            document.getElementById('attachBtn').addEventListener('click', () => fileInput.click());
        })();
    </script>
</body>
</html>
