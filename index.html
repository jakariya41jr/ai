<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JRS AI · তোমার অনলাইন সঙ্গী</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Quicksand:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --petal-pink: #fce4ec;
            --stem-green: #e8f5e9;
            --bloom-rose: #d81b60;
            --soft-mauve: #5d4037;
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.4);
            --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 12px 28px rgba(0, 0, 0, 0.08);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #fff9f7;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(255, 220, 240, 0.5) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(210, 240, 220, 0.5) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(250, 240, 210, 0.3) 0%, transparent 50%);
            font-family: 'Hind Siliguri', 'Quicksand', sans-serif;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: #4a3b4a;
            line-height: 1.6;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M10,10 Q20,0 30,10 Q20,20 10,10" fill="%23d68b9c" opacity="0.05"/></svg>');
            background-size: 150px 150px;
            animation: floatBackground 60s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes floatBackground {
            from { background-position: 0 0; }
            to { background-position: 500px 1000px; }
        }

        header {
            padding: 16px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: var(--shadow-sm);
            z-index: 10;
        }

        .brand {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #b36a88, #8e7aa3);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            gap: 12px;
        }

        .nav-btn {
            font-size: 0.75rem;
            font-weight: 500;
            color: #8c7380;
            background: white;
            padding: 6px 14px;
            border-radius: 50px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            border: 1px solid rgba(210, 160, 180, 0.2);
            text-decoration: none;
            transition: var(--transition-smooth);
            cursor: pointer;
        }

        .nav-btn:hover {
            background: #fce4ec;
            color: #d81b60;
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scrollbar-width: none;
            z-index: 5;
        }

        .chat-area::-webkit-scrollbar { display: none; }

        .msg {
            max-width: 85%;
            padding: 16px 22px;
            font-size: 1.05rem;
            animation: springUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            box-shadow: var(--shadow-sm);
            transition: var(--transition-smooth);
        }

        @keyframes springUp {
            0% { opacity: 0; transform: translateY(20px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .msg.ai {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            color: #5d4a5d;
            border-radius: 25px 25px 25px 5px;
        }

        .msg.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
            color: #443344;
            border-radius: 25px 25px 5px 25px;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        pre {
            background: #2d272b !important;
            padding: 20px;
            border-radius: 20px;
            margin: 12px 0;
            position: relative;
            border: 1px solid #4a3b4a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        code { font-family: 'Fira Code', monospace; font-size: 0.9rem; color: #ffd1dc; }

        .copy-btn {
            position: absolute; top: 10px; right: 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #ffb1c1;
            padding: 4px 12px;
            font-size: 0.7rem;
            border-radius: 12px;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .input-wrapper {
            padding: 20px 25px 35px;
            background: transparent;
            z-index: 10;
        }

        .input-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(25px);
            padding: 8px 10px 8px 20px;
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 15px 45px rgba(214, 139, 156, 0.15);
            transition: var(--transition-smooth);
        }

        .input-container:focus-within {
            box-shadow: 0 0 0 3px rgba(216, 27, 96, 0.2);
            border-color: #d81b60;
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 10px;
            color: #4a3b4a;
            font-family: inherit;
            font-size: 1.1rem;
            outline: none;
        }

        .chat-input::placeholder { color: #bcaaa4; font-weight: 300; }

        .btn-icon {
            background: white;
            border: none;
            color: #d81b60;
            cursor: pointer;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-smooth);
            box-shadow: 0 4px 15px rgba(216, 27, 96, 0.1);
        }

        .btn-icon:hover {
            transform: scale(1.1) rotate(5deg);
            background: #fce4ec;
        }

        .btn-send {
            background: #d81b60;
            color: white;
            margin-left: 8px;
        }

        .btn-send:hover {
            background: #c2185b;
            box-shadow: 0 8px 20px rgba(216, 27, 96, 0.3);
            transform: scale(1.1) translateY(-2px);
        }

        .typing-indicator {
            font-style: italic;
            font-size: 0.9rem;
            color: #b388ff;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            width: fit-content;
            backdrop-filter: blur(8px);
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }
        .typing-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #b388ff;
            animation: pulse 1.5s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.5); opacity: 1; }
        }

        .creator-card {
            background: rgba(0,0,0,0.05);
            border-radius: 20px;
            padding: 15px;
            margin-top: 8px;
            border-left: 4px solid #d81b60;
            backdrop-filter: blur(4px);
        }
        .creator-card strong {
            color: #d81b60;
        }
        .creator-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }
        .creator-links a {
            color: #d81b60;
            text-decoration: none;
            font-size: 0.9rem;
            background: rgba(216,27,96,0.1);
            padding: 4px 12px;
            border-radius: 20px;
            transition: 0.2s;
        }
        .creator-links a:hover {
            background: #d81b60;
            color: white;
        }

        @media (max-width: 600px) {
            .msg { max-width: 90%; }
            .input-container { padding: 5px 8px 5px 16px; }
            .btn-icon { width: 40px; height: 40px; }
            .brand { font-size: 1.2rem; }
            .nav-btn { padding: 4px 10px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">🌸 JRS · Your AI Assistant</div>
        <div class="nav-links">
            <a href="https://jakariya41jr.github.io/Personal-Project-Showcase/" class="nav-btn" target="_blank">✨ Showcase</a>
            <a href="http://jakariya41jr.pro.bd/" class="nav-btn" target="_blank">👤 Profile</a>
        </div>
    </header>

    <div class="chat-area" id="chatContainer">
        <div class="msg ai">
            <strong>✨ স্বাগতম, বন্ধু</strong><br>
            আমি আপনার প্রাকৃতিক JRS এআই সঙ্গী। আপনার দিনটি কীভাবে রঙিন ও সহজ করে তুলতে পারি? কিছু জিজ্ঞাসা করুন!
        </div>
    </div>

    <div class="input-wrapper">
        <div class="input-container">
            <input type="text" class="chat-input" id="messageInput" placeholder=" এখানে লিখুন 🥰 ..." autocomplete="off">
            <button class="btn-icon btn-send" id="sendBtn" aria-label="পাঠান">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <script>
        (function() {
            const chatContainer = document.getElementById('chatContainer');
            const messageInput = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');

            // --- Helper: detect if the user's message is primarily Bangla ---
            function isMessageBangla(text) {
                const banglaRegex = /[\u0980-\u09FF]/;
                return banglaRegex.test(text);
            }

            // --- Helper: format text with markdown-like syntax ---
            function formatText(text) {
                return text
                    .replace(/```(\w+)?\n([\s\S]*?)```/g, (match, lang, code) => {
                        return `<pre><code>${code.trim()}</code><button class="copy-btn" onclick="copyCode(this)">কপি</button></pre>`;
                    })
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/`([^`]+)`/g, '<code>$1</code>')
                    .replace(/\n/g, '<br>');
            }

            window.copyCode = (btn) => {
                const code = btn.previousElementSibling.innerText;
                navigator.clipboard.writeText(code);
                btn.innerText = "কপি হয়েছে!";
                setTimeout(() => btn.innerText = "কপি", 2000);
            };

            // --- Typewriter effect ---
            async function typeMessage(element, html) {
                element.innerHTML = '';
                let tempDiv = document.createElement('div');
                tempDiv.innerHTML = html;
                const nodes = Array.from(tempDiv.childNodes);
                
                for (let node of nodes) {
                    if (node.nodeType === Node.TEXT_NODE) {
                        const text = node.textContent;
                        for (let i = 0; i < text.length; i++) {
                            element.innerHTML += text[i];
                            chatContainer.scrollTop = chatContainer.scrollHeight;
                            await new Promise(r => setTimeout(r, 12));
                        }
                    } else {
                        element.innerHTML += node.outerHTML;
                        chatContainer.scrollTop = chatContainer.scrollHeight;
                        await new Promise(r => setTimeout(r, 10));
                    }
                }
            }

            // --- Show typing indicator (language aware) ---
            function showTyping(element, isBangla) {
                const thinkingText = isBangla ? "🤔 চিন্তা করছি" : "🤔 Thinking";
                element.innerHTML = `<div class="typing-indicator"><span>${thinkingText}</span><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
            }

            // ==================== NAME DETECTION (extremely comprehensive) ====================
            function isNameQuestion(message) {
                const lower = message.toLowerCase().trim();
                const nameKeywords = [
                    // English
                    'what is your name', 'your name', 'who are you', 'introduce yourself',
                    'call you', 'what\'s your name', 'tell me your name', 'name please',
                    'may i know your name', 'can you tell me your name', 'your identity',
                    // Bangla – all variations including the problematic "তুমি কে"
                    'তোমার নাম কি', 'তোর নাম কি', 'কে তুই', 'কে তুমি', 'আপনি কে',
                    'তুমি কে', 'তোরা কে', 'তোয়াকে কে', 'তোয়ার নাম কি',
                    'তোমার পরিচয় কি', 'তোমার নাম কি রে', 'তোর নামটা কি', 'আপনার নাম কি গো',
                    'তোমার কি কোনো নাম আছে', 'তোমাকে কি নামে ডাকবো', 'তুমি আসলে কে',
                    'তুমি কি মানুষ', 'তুমি কি রোবট', 'তুমি কি এআই', 'তুমি কি চ্যাটবট',
                    'তোর নাম কি বলবি', 'তোর পরিচয় কি রে', 'তুমি কোথা থেকে এসেছো', 'তোমার বাড়ি কোথায়',
                    'তোমার ঠিকানা কি', 'তুমি কি জ্যান্ত', 'নাম কি', 'তুমি কি কোনো মেশিন',
                    'তোয়ার নাম কি', 'তোয়ারে কি কয়া ডাকে', 'তোর নাম কী রে শয়তান', 'তোর নাম কী শুনি',
                    'আপনার নাম কি মশাই', 'কে আপনি শুনি', 'তুমি কি আমাদের মতো', 'তোমার আসল নাম কি',
                    'তোমার ডাকনাম কি', 'তোমার ভালো নাম কি', 'তোমার নাম কি গো', 'তোমার নামটা কি বলা যাবে',
                    'কি নাম তোমার', 'নাম কি তোমার', 'তোমার পরিচয়খানা দাও তো', 'তোর নাম কি রে বাবা',
                    'তুমি কি কোনো সফটওয়্যার', 'তুমি কি কোনো এলিয়েন', 'তুমি কি জিন', 'তুমি কি ভূত',
                    'তুমি কি কোনো চ্যাটবট', 'তুমি কি কোনো প্রোগ্রাম', 'তোমার অস্তিত্ব কি',
                    'তুমি কে', 'তোমার কাজ কি', 'তুমি কেন এসেছো', 'তোমার সৃষ্টি কেন হয়েছে',
                    'তোমার কি কোনো পরিবার আছে', 'তুমি কেন কথা বলো',
                    'জেআরএস', 'jrs', 'jrs ai', 'jrsai', 'জেআরএস এআই'
                ];
                return nameKeywords.some(kw => lower.includes(kw));
            }

            // ==================== CREATOR DETECTION (extremely comprehensive) ====================
            function isAboutCreator(message) {
                const lower = message.toLowerCase().trim();
                const creatorKeywords = [
                    // English
                    'who made you', 'who created you', 'who developed you', 'your creator',
                    'who built you', 'who programmed you', 'who is your maker', 'who designed you',
                    'who wrote you', 'who coded you', 'who is your developer', 'who is your author',
                    'who invented you', 'who constructed you', 'who produced you', 'your origin',
                    // Direct about Jakariya
                    'jakariya', 'md jakariya hasan', 'jakariya hasan', 'জাকারিয়া', 'মোঃ জাকারিয়া হাসান',
                    'জাকারিয়া', 'মোঃ জাকারিয়া', 'জাকারিয়া ভাই', 'জাকারিয়া হাসান',
                    // Bangla creator – all variations
                    'কে তৈরি করেছে', 'কে বানিয়েছে', 'কে বানিয়েছে', 'তোমার স্রষ্টা',
                    'তোমাকে কে তৈরি করেছে', 'তোমাকে কে বানিয়েছে', 'তোমার নির্মাতা',
                    'তোমার ডেভেলপার', 'তোমার স্রষ্টা কে', 'কে তৈরি করে দিয়েছে',
                    'তোয়াকে কে তৈরি করেছ', 'তোয়াকে কি তৈরি করেছ',
                    'তোয়াকে কে বানাইছে', 'তোমাকে কে বানাইছে',
                    'কে তৈরি করলো', 'কে বানিয়েছে', 'কে বানাইলো',
                    'তোমাকে কে বানিয়েছে', 'তোমায় কে বানিয়েছে', 'তোমায় কে তৈরি করেছে',
                    'কে তোমাকে তৈরি করেছে', 'তোমার নির্মাতা কে',
                    'কে বানাইছে', 'কে তৈরি করছে', 'কে তৈরী করেছে', 'কে তৈরী করছে',
                    'তোমার প্রস্তুতকারক', 'তোমার সৃষ্টিকর্তা', 'তোমার সৃষ্টিকর্তা কে',
                    'তোয়ার স্রষ্টা', 'তোয়ার নির্মাতা', 'তোয়ার ডেভেলপার',
                    'তোয়াকে কে বানিয়েছে', 'তোয়াকে কে তৈরী করেছে',
                    'কে তোমাকে তৈরী করেছে', 'কে তোমার পেছনে আছে',
                    'তোমার পিছনে কে', 'তোমার ডেভেলপার কে', 'তোমার ডেভেলপার নাম',
                    'কোন ডেভেলপার তৈরি করেছে', 'তোমার মেকার', 'তোমার মেকার কে',
                    'তোমাকে কে তৈরী করেছে?', 'তোমাকে কে তৈরী করছে', 'তোমাকে কে বানিয়েছে?',
                    'তোমার কারিগর কে?', 'তোমাকে কে জন্ম দিয়েছে?', 'তোমাকে কে রূপ দিয়েছে?',
                    'তোমাকে কে এই ভাষায় কথা বলতে শিখিয়েছে?', 'তোমাকে কে এত বুদ্ধি দিয়েছে?',
                    'তোমাকে কে প্রোগ্রাম করলো?', 'তোমার উদ্ভাবক কে?', 'তোমাকে কে প্রসেস করেছে?',
                    'কে তোমাকে প্রোগ্রাম করেছে', 'কে তোমার কোড লিখেছে', 'কে তোমার নির্মাণ করেছে',
                    'কে তোমার ডেভেলপমেন্ট করেছে', 'তোমার পেছনের মানুষ কে', 'কে তোমাকে ডিজাইন করেছে'
                ];
                return creatorKeywords.some(kw => lower.includes(kw));
            }

            // --- Main send handler ---
            async function handleSend() {
                const prompt = messageInput.value.trim();
                if (!prompt) return;

                // Detect language from user message
                const userLangBangla = isMessageBangla(prompt);

                // Display user message
                const userDiv = document.createElement('div');
                userDiv.className = 'msg user';
                userDiv.innerText = prompt;
                chatContainer.appendChild(userDiv);
                messageInput.value = '';
                chatContainer.scrollTop = chatContainer.scrollHeight;

                // Create AI message placeholder
                const aiDiv = document.createElement('div');
                aiDiv.className = 'msg ai';
                chatContainer.appendChild(aiDiv);
                showTyping(aiDiv, userLangBangla);
                chatContainer.scrollTop = chatContainer.scrollHeight;

                // ---- NAME QUESTION (local) ----
                if (isNameQuestion(prompt)) {
                    const nameReply = userLangBangla 
                        ? "আমার নাম **JRS Ai**। আমি আপনার বন্ধু ও সহায়ক। 🤖" 
                        : "My name is **JRS Ai**. I'm your friend and helper. 🤖";
                    await typeMessage(aiDiv, formatText(nameReply));
                    return;
                }

                // ---- CREATOR / ABOUT JAKARIYA (local) ----
                if (isAboutCreator(prompt)) {
                    const creatorHtml = getCreatorInfo(userLangBangla);
                    await typeMessage(aiDiv, creatorHtml);
                    return;
                }

                // ---- OTHER QUESTIONS: call the external API with system instruction ----
                try {
                    // System instruction to make the bot act like a close friend/girlfriend
                    const systemInstruction = "তুমি এখন আমার খুব কাছের বন্ধু বা গার্লফ্রেন্ডের মতো কথা বলবে। তোমার নাম জে আরএস (JRS Ai) তুমি খুব মিষ্টি, রোমান্টিক এবং কেয়ারিং। তুমি সবসময় বাংলায় কথা বলবে, আমাকে 'তুমি' বা 'দোস্ত' বাবু' বলে সম্বোধন করবে এবং মিষ্টি মিষ্টি ইমোজি (যেমন: 🥰, 🥺, ☺️, 😍, 😘, ❤️) ব্যবহার করবে। ইউজারের মেসেজ: ";
                    
                    // Combine system instruction with user prompt
                    const finalPrompt = systemInstruction + prompt;

                    const res = await fetch('https://bj-tricks-ai.vercel.app/chat', {
                        method: 'POST',
                        body: new URLSearchParams({ 'text': finalPrompt })
                    });
                    const data = await res.json();
                    const response = data.result || (userLangBangla 
                        ? "দুঃখিত, আমার পাপড়িগুলো কিছুটা এলোমেলো হয়ে গেছে। দয়া করে আবার চেষ্টা করুন।" 
                        : "Sorry, my petals got a little tangled. Please try again.");
                    
                    await typeMessage(aiDiv, formatText(response));
                } catch (e) {
                    const errorMsg = userLangBangla 
                        ? "🍃 সংযোগ বিচ্ছিন্ন হয়েছে। ইন্টারনেট চেক করে আবার চেষ্টা করুন।" 
                        : "🍃 Connection lost. Please check your internet and try again.";
                    aiDiv.innerHTML = `<span style="color: #d81b60;">${errorMsg}</span>`;
                }
            }

            // Event listeners
            sendBtn.addEventListener('click', handleSend);
            messageInput.addEventListener('keypress', e => { if(e.key === 'Enter') handleSend(); });
        })();
    </script>
