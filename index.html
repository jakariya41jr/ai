<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JRS AI · তোমার অনলাইন সঙ্গী</title>
    <meta name="description" content="JRS AI - তোমার মিষ্টি, রোমান্টিক ও কেয়ারিং অনলাইন বন্ধু। মোঃ জাকারিয়া হাসানের সৃষ্টি।">
    <meta name="theme-color" content="#ff758c">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700;800&family=Quicksand:wght@400;500;600;700&family=Fira+Code:wght@400;500&family=Noto+Color+Emoji&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff758c;
            --primary-dark: #d81b60;
            --primary-light: #ffb3c6;
            --secondary: #c084fc;
            --accent-gold: #f59e0b;
            --ai-bg: #ffffff;
            --user-bg-start: #e0c3fc;
            --user-bg-end: #8ec5fc;
            --bg-main: #fff9fb;
            --bg-overlay: #fff0f3;
            --text-dark: #2d1826;
            --text-medium: #5d3a4a;
            --text-light: #8c6b7a;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.6);
            --shadow-sm: 0 2px 8px rgba(180, 100, 120, 0.08);
            --shadow-md: 0 8px 24px rgba(180, 100, 120, 0.12);
            --shadow-lg: 0 16px 40px rgba(180, 100, 120, 0.18);
            --shadow-glow: 0 0 30px rgba(255, 117, 140, 0.3);
            --radius-sm: 10px;
            --radius-md: 18px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --radius-full: 50%;
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --font-main: 'Hind Siliguri', 'Quicksand', sans-serif;
            --font-mono: 'Fira Code', 'Courier New', monospace;
            --font-emoji: 'Noto Color Emoji', 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif;
        }

        [data-theme="dark"] {
            --ai-bg: #1e1b2e;
            --user-bg-start: #3d2a4a;
            --user-bg-end: #2a3d5c;
            --bg-main: #0f0a14;
            --bg-overlay: #1a1220;
            --text-dark: #f0e0f0;
            --text-medium: #c5b0c5;
            --text-light: #9a8a9a;
            --glass-bg: rgba(30, 25, 40, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 30px rgba(192, 132, 252, 0.4);
        }

        [data-theme="ocean"] {
            --primary: #4facfe;
            --primary-dark: #0066cc;
            --primary-light: #a0d8ef;
            --secondary: #43e97b;
            --ai-bg: #ffffff;
            --user-bg-start: #a8edea;
            --user-bg-end: #fed6e3;
            --bg-main: #f0fafd;
            --bg-overlay: #e6f7fc;
            --text-dark: #1a2a3a;
            --text-medium: #3a5a6a;
            --text-light: #6a8a9a;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --shadow-glow: 0 0 30px rgba(79, 172, 254, 0.35);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        input,
        textarea,
        .chat-area,
        .msg,
        pre code,
        .copy-btn {
            -webkit-user-select: text;
            user-select: text;
        }

        html {
            height: 100%;
            overflow: hidden;
        }

        body {
            background-color: var(--bg-main);
            background-image:
                radial-gradient(ellipse at 20% 10%, var(--bg-overlay) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 90%, rgba(192, 132, 252, 0.15) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 179, 198, 0.1) 0%, transparent 60%);
            font-family: var(--font-main);
            height: 100dvh;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: var(--text-dark);
            position: relative;
            transition: background-color var(--transition-smooth), background-image var(--transition-smooth);
        }

        .particles-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            animation: floatUp linear infinite;
            opacity: 0;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(105vh) scale(0) rotate(0deg);
                opacity: 0;
            }
            5% {
                opacity: 0.7;
            }
            85% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-10vh) scale(1.2) rotate(720deg);
                opacity: 0;
            }
        }

        header {
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: var(--shadow-sm);
            z-index: 20;
            gap: 12px;
            flex-shrink: 0;
            transition: all var(--transition-smooth);
        }

        .brand-group {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .brand-icon {
            width: 38px;
            height: 38px;
            border-radius: var(--radius-full);
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            box-shadow: var(--shadow-glow);
            animation: gentlePulse 3s ease-in-out infinite;
        }
        @keyframes gentlePulse {
            0%,
            100% {
                box-shadow: 0 0 15px rgba(255, 117, 140, 0.4);
            }
            50% {
                box-shadow: 0 0 30px rgba(255, 117, 140, 0.7);
            }
        }
        .brand-name {
            font-weight: 700;
            font-size: 1.25rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.3px;
            white-space: nowrap;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: nowrap;
        }
        .header-btn {
            width: 34px;
            height: 34px;
            border-radius: var(--radius-full);
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            transition: var(--transition-fast);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: relative;
            flex-shrink: 0;
        }
        .header-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary-light);
        }
        .header-btn:active {
            transform: scale(0.92);
        }
        .profile-link {
            text-decoration: none;
            padding: 7px 14px;
            border-radius: 20px;
            background: var(--glass-bg);
            color: var(--primary-dark);
            font-size: 0.78rem;
            font-weight: 600;
            border: 1px solid var(--glass-border);
            transition: var(--transition-fast);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .profile-link:hover {
            background: var(--primary-light);
            color: #fff;
            box-shadow: var(--shadow-md);
        }

        .theme-panel {
            position: fixed;
            top: 70px;
            right: 16px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 14px;
            z-index: 30;
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            gap: 10px;
            transform: translateX(120%);
            opacity: 0;
            transition: var(--transition-bounce);
            pointer-events: none;
        }
        .theme-panel.open {
            transform: translateX(0);
            opacity: 1;
            pointer-events: auto;
        }
        .theme-dot {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-full);
            cursor: pointer;
            border: 3px solid transparent;
            transition: var(--transition-fast);
            box-shadow: var(--shadow-sm);
        }
        .theme-dot:hover {
            transform: scale(1.15);
            box-shadow: var(--shadow-md);
        }
        .theme-dot.active {
            border-color: var(--primary-dark);
            box-shadow: var(--shadow-glow);
        }
        .theme-dot-rose {
            background: linear-gradient(135deg, #ff758c, #ffb3c6);
        }
        .theme-dot-dark {
            background: linear-gradient(135deg, #2d1826, #5d3a4a);
        }
        .theme-dot-ocean {
            background: linear-gradient(135deg, #4facfe, #a8edea);
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scrollbar-width: thin;
            scrollbar-color: var(--primary-light) transparent;
            z-index: 5;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }
        .chat-area::-webkit-scrollbar {
            width: 5px;
        }
        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: var(--primary-light);
            border-radius: 10px;
        }

        .msg {
            max-width: 88%;
            padding: 13px 17px;
            border-radius: var(--radius-lg);
            font-size: 0.98rem;
            line-height: 1.6;
            box-shadow: var(--shadow-sm);
            animation: msgSlideIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            word-break: break-word;
            transition: var(--transition-fast);
        }
        .msg:hover {
            box-shadow: var(--shadow-md);
        }
        @keyframes msgSlideIn {
            0% {
                opacity: 0;
                transform: translateY(18px) scale(0.94);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .msg.ai {
            align-self: flex-start;
            background: var(--ai-bg);
            color: var(--text-dark);
            border-bottom-left-radius: 5px;
            border: 1px solid var(--glass-border);
        }
        .msg.user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--user-bg-start), var(--user-bg-end));
            color: #1a1a2e;
            border-bottom-right-radius: 5px;
            font-weight: 500;
        }
        .msg .timestamp {
            font-size: 0.65rem;
            color: var(--text-light);
            margin-top: 6px;
            text-align: right;
            opacity: 0.7;
        }
        .msg.ai .timestamp {
            text-align: left;
        }

        .msg pre {
            background: #1e1b2e !important;
            padding: 16px 14px;
            border-radius: var(--radius-md);
            margin: 10px 0;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow-x: auto;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.3);
        }
        .msg pre code {
            font-family: var(--font-mono);
            font-size: 0.82rem;
            color: #e8d5f5;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffb3c6;
            padding: 5px 12px;
            font-size: 0.7rem;
            border-radius: 14px;
            cursor: pointer;
            font-family: var(--font-main);
            transition: var(--transition-fast);
            z-index: 2;
        }
        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }
        .copy-btn.copied {
            background: #43e97b;
            color: #1a1a2e;
            border-color: #43e97b;
            animation: popIn 0.4s ease;
        }
        @keyframes popIn {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }

        .creator-card {
            background: var(--ai-bg);
            padding: 16px;
            border-radius: var(--radius-md);
            border-left: 5px solid var(--primary-dark);
            margin: 6px 0;
            font-size: 0.9rem;
            line-height: 1.6;
            box-shadow: var(--shadow-sm);
        }
        .creator-card strong {
            color: var(--primary-dark);
        }
        .creator-card .social-links {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .creator-card .social-links a {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: var(--primary-dark);
            text-decoration: none;
            font-size: 0.8rem;
            background: rgba(216, 27, 96, 0.08);
            padding: 5px 12px;
            border-radius: 20px;
            transition: var(--transition-fast);
            font-weight: 500;
        }
        .creator-card .social-links a:hover {
            background: var(--primary-dark);
            color: #fff;
        }

        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 6px 0;
            animation: fadeSlideIn 0.5s ease;
        }
        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .quick-reply-chip {
            padding: 7px 15px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: var(--transition-fast);
            white-space: nowrap;
            color: var(--text-medium);
        }
        .quick-reply-chip:hover {
            background: var(--primary-light);
            color: #fff;
            border-color: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .typing-indicator-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            background: var(--ai-bg);
            border-radius: var(--radius-lg);
            width: fit-content;
            max-width: 85%;
            align-self: flex-start;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-sm);
            animation: msgSlideIn 0.3s ease;
        }
        .typing-dots {
            display: flex;
            gap: 5px;
        }
        .typing-dots span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--primary);
            animation: typingBounce 1.4s infinite;
        }
        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes typingBounce {
            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        .input-wrapper {
            padding: 12px 14px 22px;
            background: transparent;
            z-index: 15;
            flex-shrink: 0;
        }
        .input-container {
            max-width: 750px;
            margin: 0 auto;
            display: flex;
            align-items: flex-end;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 5px 6px 5px 16px;
            border-radius: var(--radius-xl);
            border: 2px solid var(--glass-border);
            box-shadow: var(--shadow-md);
            transition: var(--transition-smooth);
            gap: 4px;
        }
        .input-container:focus-within {
            border-color: var(--primary);
            box-shadow: var(--shadow-lg), 0 0 0 5px rgba(255, 117, 140, 0.12);
        }
        .emoji-quick-bar {
            display: flex;
            gap: 4px;
            padding: 4px 0;
            overflow-x: auto;
            max-width: 750px;
            margin: 0 auto 8px;
            scrollbar-width: none;
        }
        .emoji-quick-bar::-webkit-scrollbar {
            display: none;
        }
        .emoji-chip {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-full);
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: var(--transition-fast);
            font-family: var(--font-emoji);
        }
        .emoji-chip:hover {
            transform: scale(1.2);
            box-shadow: var(--shadow-sm);
            background: #fff;
        }
        .chat-input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 1rem;
            font-family: var(--font-main);
            padding: 10px 4px;
            color: var(--text-dark);
            min-height: 44px;
            line-height: 1.4;
            caret-color: var(--primary-dark);
        }
        .chat-input::placeholder {
            color: var(--text-light);
            font-weight: 300;
            opacity: 0.7;
        }
        .input-actions {
            display: flex;
            gap: 4px;
            align-items: flex-end;
            flex-shrink: 0;
        }
        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-full);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-bounce);
            flex-shrink: 0;
        }
        .btn-send {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            box-shadow: 0 4px 14px rgba(216, 27, 96, 0.3);
        }
        .btn-send:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 20px rgba(216, 27, 96, 0.45);
        }
        .btn-send:active {
            transform: scale(0.9);
        }
        .btn-send:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-mic {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-medium);
        }
        .btn-mic:hover {
            background: #fff;
        }
        .char-counter {
            font-size: 0.65rem;
            color: var(--text-light);
            text-align: right;
            max-width: 750px;
            margin: 4px auto 0;
            padding-right: 8px;
            opacity: 0;
            transition: opacity var(--transition-fast);
        }
        .char-counter.visible {
            opacity: 0.8;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: #2d1826;
            color: #fff;
            padding: 12px 22px;
            border-radius: var(--radius-xl);
            font-size: 0.85rem;
            z-index: 100;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            transition: transform var(--transition-bounce);
            pointer-events: none;
            font-family: var(--font-main);
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #43e97b;
            display: inline-block;
            animation: statusPulse 2s infinite;
            flex-shrink: 0;
        }
        @keyframes statusPulse {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(67, 233, 123, 0.6);
            }
            50% {
                box-shadow: 0 0 0 8px rgba(67, 233, 123, 0);
            }
        }

        @media (max-width: 600px) {
            .msg {
                max-width: 92%;
                padding: 11px 14px;
                font-size: 0.92rem;
            }
            .brand-name {
                font-size: 1.05rem;
            }
            .btn-icon {
                width: 36px;
                height: 36px;
            }
            .input-container {
                padding: 3px 4px 3px 12px;
                border-radius: 24px;
            }
            .emoji-chip {
                width: 30px;
                height: 30px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body data-theme="rose">
    <div class="particles-container" id="particlesContainer" aria-hidden="true"></div>
    <div class="toast" id="toast" aria-live="polite"></div>

    <div class="theme-panel" id="themePanel" aria-label="থিম পরিবর্তন করুন">
        <span style="font-size:0.75rem;font-weight:600;color:var(--text-medium);text-align:center;">🎨 থিম</span>
        <div class="theme-dot theme-dot-rose active" data-theme="rose" title="গোলাপি"></div>
        <div class="theme-dot theme-dot-dark" data-theme="dark" title="ডার্ক"></div>
        <div class="theme-dot theme-dot-ocean" data-theme="ocean" title="সাগর"></div>
    </div>

    <header>
        <div class="brand-group">
            <div class="brand-icon" aria-hidden="true">🌸</div>
            <span class="brand-name">JRS AI</span>
            <span class="status-dot" title="অনলাইন" aria-label="অনলাইন"></span>

            function formatText(text) {
                return text
                    .replace(/```(\w+)?\n?([\s\S]*?)```/g, (match, lang, code) => {
                        const escapedCode = code.trim().replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                        const langLabel = lang ? `<small style="color:#aaa;">${lang}</small>` : '';
                        return `<pre>${langLabel}<code>${escapedCode}</code><button class="copy-btn" data-code="${escapedCode.replace(/"/g, '&quot;')}">📋 কপি</button></pre>`;
                    })
                    .replace(/`([^`]+)`/g, '<code style="background:rgba(0,0,0,0.06);padding:2px 7px;border-radius:5px;font-family:var(--font-mono);">$1</code>')
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*(.*?)\*/g, '<em>$1</em>')
                    .replace(/~~(.*?)~~/g, '<del>$1</del>')
                    .replace(/\n/g, '<br>');
            }

            async function handleSend() {
                if (isProcessing) return;
                const text = userInput.value.trim();
                if (!text) return;
                if (text.length > 800) {
                    showToast('⚠️ মেসেজ ৮০০ অক্ষরের মধ্যে সীমাবদ্ধ');
                    return;
                }

                userInput.value = '';
                updateSendButton();
                updateCharCounter();

                const initialQR = document.getElementById('initialQuickReplies');
                if (initialQR) initialQR.remove();
                chatArea.querySelectorAll('.quick-replies').forEach(q => q.remove());

                addMessage(text, false);
                isProcessing = true;
                sendBtn.disabled = true;

                const userLangBangla = isBangla(text);
                showTypingIndicator();

                if (isNameQuestion(text)) {
                    await simulateDelay(400, 800);
                    removeTypingIndicator();
                    const reply = userLangBangla ?
                        'আমার নাম <strong>JRS AI</strong>। আমি তোমার মিষ্টি বন্ধু ও সহায়ক, সবসময় তোমার পাশে আছি। 🤖🥰' :
                        'My name is <strong>JRS AI</strong>. I\'m your sweet friend and helper, always here for you. 🤖🥰';
                    addMessage(reply, true, true);
                    addQuickReplies([
                        { label: '👤 কে বানিয়েছে?', query: 'তোমাকে কে বানিয়েছে?' },
                        { label: '💬 কি খবর?', query: 'কি খবর দোস্ত?' }
                    ]);
                    finishProcessing();
                    return;
                }

                if (isAboutCreator(text)) {
                    await simulateDelay(500, 900);
                    removeTypingIndicator();
                    addMessage(getCreatorInfoHTML(userLangBangla), true, true);
                    finishProcessing();
                    return;
                }

                if (isIdentityConfusion(text)) {
                    await simulateDelay(300, 600);
                    removeTypingIndicator();
                    const reply = userLangBangla ?
                        '🥺 দোস্ত, আমি <strong>JRS AI</strong> — আমাকে আমার স্রষ্টা <strong>মোঃ জাকারিয়া হাসান</strong> তৈরি করেছেন। ❤️' :
                        '🥺 Buddy, I\'m <strong>JRS AI</strong> — created by <strong>Md Jakariya Hasan</strong>. ❤️';
                    addMessage(reply, true, true);
                    finishProcessing();
                    return;
                }

                try {
                    const systemPrompt = userLangBangla ?
                        `তোমার নাম JRS AI। তোমার স্রষ্টা মোঃ জাকারিয়া হাসান। তুমি কখনোই নিজেকে Llama, Meta বা অন্য কোম্পানির AI বলবে না। তুমি মিষ্টি, কেয়ারিং বন্ধু। ইমোজি ব্যবহার করবে। বর্তমান সময়: ${getTimeBasedGreeting()}।` :
                        `Your name is JRS AI, created by Md Jakariya Hasan. Never claim to be from any other company. Be sweet and friendly.`;

                    // API Context Builder (আগের মেসেজগুলো পড়ে মেমরি তৈরি করা হচ্ছে)
                    const apiMessages = [{ role: 'system', content: systemPrompt }];
                    const messageNodes = chatArea.querySelectorAll('.msg:not(.typing-indicator-wrap)');
                    // শেষ ৮টি মেসেজ নিচ্ছি যাতে টোকেন লিমিট ক্রস না করে এবং হিস্ট্রি বজায় থাকে
                    const recentNodes = Array.from(messageNodes).slice(-8); 
                    
                    recentNodes.forEach(node => {
                        const role = node.classList.contains('ai') ? 'assistant' : 'user';
                        const clone = node.cloneNode(true);
                        const ts = clone.querySelector('.timestamp');
                        if(ts) ts.remove();
                        clone.querySelectorAll('.copy-btn').forEach(b => b.remove());
                        const content = clone.textContent.trim();
                        // ওয়েলকাম মেসেজ স্কিপ করছি টোকেন বাঁচাতে
                        if (content && !content.includes('✨ হাই দোস্ত!')) {
                             apiMessages.push({ role, content });
                        }
                    });

                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                        body: JSON.stringify({
                            model: MODEL,
                            messages: apiMessages,
                            temperature: TEMPERATURE,
                            max_tokens: MAX_TOKENS,
                        })
                    });

                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const data = await response.json();
                    removeTypingIndicator();
                    let reply = data.choices?.[0]?.message?.content || '';
                    reply = sanitizeAIResponse(reply);
                    addMessage(formatText(reply), true, true);
                } catch (err) {
                    removeTypingIndicator();
                    addMessage(userLangBangla ? '🥺 উফ্! একটু সমস্যা হচ্ছে। আবার চেষ্টা করবে?' : '🥺 Oops! Something went wrong.', true, true);
                }
                finishProcessing();
            }

            function simulateDelay(min, max) {
                return new Promise(resolve => setTimeout(resolve, Math.floor(Math.random() * (max - min + 1)) + min));
            }

            function finishProcessing() {
                isProcessing = false;
                sendBtn.disabled = false;
                userInput.focus();
                updateSendButton();
                saveChatHistory();
            }

            function updateSendButton() {
                const hasText = userInput.value.trim().length > 0;
                sendBtn.disabled = !hasText || isProcessing;
            }

            function updateCharCounter() {
                const len = userInput.value.length;
                charCounter.textContent = `${len} / 800`;
                charCounter.classList.toggle('visible', len > 0);
                charCounter.style.color = len > 700 ? '#e74c3c' : '';
            }

            function setupEventListeners() {
                sendBtn.addEventListener('click', handleSend);
                userInput.addEventListener('keypress', e => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        handleSend();
                    }
                });
                userInput.addEventListener('input', () => {
                    updateSendButton();
                    updateCharCounter();
                });
                userInput.addEventListener('paste', () => {
                    setTimeout(() => {
                        if (userInput.value.length > 800) {
                            userInput.value = userInput.value.substring(0, 800);
                            showToast('⚠️ মেসেজ ৮০০ অক্ষরে সীমাবদ্ধ');
                        }
                        updateSendButton();
                        updateCharCounter();
                    }, 10);
                });

                micBtn.addEventListener('click', () => {
                    showToast('🎤 ভয়েস ইনপুট শীঘ্রই আসছে!');
                });

                themeToggleBtn.addEventListener('click', () => {
                    themePanel.classList.toggle('open');
                    if (themePanel.classList.contains('open')) {
                        setTimeout(() => themePanel.classList.remove('open'), 5000);
                    }
                });

                document.querySelectorAll('.theme-dot').forEach(dot => {
                    dot.addEventListener('click', function() {
                        applyTheme(this.getAttribute('data-theme'));
                        themePanel.classList.remove('open');
                    });
                });

                clearChatBtn.addEventListener('click', () => {
                    if (confirm('সব চ্যাট মুছে ফেলবেন? 🗑️')) clearAllChat();
                });

                emojiQuickBar.querySelectorAll('.emoji-chip').forEach(chip => {
                    chip.addEventListener('click', function() {
                        const emoji = this.getAttribute('data-emoji');
                        const start = userInput.selectionStart || 0;
                        userInput.value = userInput.value.substring(0, start) + emoji + userInput.value.substring(start);
                        userInput.focus();
                        userInput.setSelectionRange(start + emoji.length, start + emoji.length);
                        updateSendButton();
                    });
                });

                document.addEventListener('click', (e) => {
                    if (themePanel.classList.contains('open') && !themePanel.contains(e.target) && e.target !== themeToggleBtn) {
                        themePanel.classList.remove('open');
                    }
                });

                const initialQR = document.getElementById('initialQuickReplies');
                if (initialQR) attachQuickReplyListeners(initialQR);
            }
        })();
    </script>
</body>
    </html>
